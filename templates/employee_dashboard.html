<!DOCTYPE html>
<html>

<head>

    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

<body class="bg-light" id="body">

    {% include "navbar.html" %}

    <div class="container mt-5">

        <div class="row g-4 text-center">

            <div class="col-md-4">

                <a href="/employee-capstone" class="text-decoration-none">

                    <div class="card shadow p-4">

                        <h5>📤 Submit Capstone</h5>

                    </div>

                </a>

            </div>

            <div class="col-md-4">

                <a href="/employee/{{ name }}" class="text-decoration-none">

                    <div class="card shadow p-4">

                        <h5>📊 View Reports</h5>

                    </div>

                </a>

            </div>

            <div class="col-md-4">

                <a href="/project-timeline" class="text-decoration-none">
                    <div class="card shadow p-4">
                        <h5>📅 Project Timeline</h5>
                    </div>
                </a>
                <!-- <a href="#" class="text-decoration-none">
                    <div class="card shadow p-4">
                        <h5>📅 Project Timeline</h5>
                    </div>
                </a> -->
