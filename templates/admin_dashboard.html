<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

</head>

<body class="bg-light" id="body">
    {% include "navbar.html" %}
    <div class="container mt-5">

        <h3 class="text-center mb-5">Admin Dashboard</h3>

        <div class="row g-4 text-center">

            <div class="col-md-4">
                <a href="/rate-product" class="text-decoration-none">
                    <div class="card shadow p-4">
                        <h5>⭐ Rate Product</h5>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="/reports" class="text-decoration-none">
                    <div class="card shadow p-4">
                        <h5>📊 View Reports</h5>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="/add-data" class="text-decoration-none">
                    <div class="card shadow p-4">
                        <h5>➕ Add New Data</h5>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="/capstone" class="text-decoration-none">
                    <div class="card shadow p-4">
                        <h5>🎓 View Capstone</h5>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="/assign-project" class="text-decoration-none">
                    <div class="card shadow p-4">
                        <h5>📋 Assign Projects</h5>
                    </div>
                </a>
                <!-- <a href="#" class="text-decoration-none">
                    <div class="card shadow p-4">
                        <h5>📋 Assign Projects</h5>
                    </div>
                </a> -->
            </div>

        </div>

    </div>

    <script>
        function toggleTheme() {
            document.getElementById("body").classList.toggle("dark-mode")
        }
    </script>

</body>

</html>
