<!DOCTYPE html>
<html>

<head>
    <title>Add New Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>

<body class="bg-light" id="body">
    {% include "navbar.html" %}
    <!-- ✅ Page Content -->
    <div class="container mt-5">

        <h4 class="mb-4">Add New Employee & Project</h4>

        <!-- Employee Form -->
        <div class="card p-4 shadow mb-4">
            <h5>Add New Employee</h5>

            <form method="POST" action="/add-employee">
                <input type="text" name="name" placeholder="Employee Name" class="form-control mb-2" required>
                <input type="text" name="loginId" placeholder="Login ID" class="form-control mb-2" required>
                <input type="text" name="password" placeholder="Password" class="form-control mb-3" required>

                <select name="position" class="form-select mb-3" required>
                    <option value="">Select Position</option>
                    <option value="apm">APM</option>
                    <option value="developer">Developer</option>
                </select>

                <button class="btn btn-success">Add Employee</button>
            </form>
        </div>

        <!-- Project Form -->
        <div class="card p-4 shadow">
            <h5>Add New Project</h5>

            <form method="POST" action="/add-project">
                <input type="text" name="projectName" placeholder="Project Name" class="form-control mb-3" required>
                <button class="btn btn-warning">Add Project</button>
            </form>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div id="flashMessage" class="alert alert-success mt-4">
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

    </div>

    <!-- ✅ 5 sec alert auto hide -->
    <script>
        setTimeout(function () {
            let alertBox = document.getElementById("flashMessage");
            if (alertBox) {
                alertBox.style.display = "none";
            }
        }, 5000);
    </script>

</body>

</html>
