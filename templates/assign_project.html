<!DOCTYPE html>
<html>

<head>
    <title>Assign Project</title>

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

</head>

<body class="bg-light" id="body">

    {% include "navbar.html" %}

    <div class="container mt-5">
        <div class="card shadow p-4">
            <form method="POST">
                <div class="row">
                    <div class="col-md-3">
                        <label>Product Name</label>
                        <select name="product" class="form-select" required>

                            <option>Select Product</option>

                            {% for p in products %}
                            <option>{{ p.projectName }}</option>
                            {% endfor %}

                        </select>
                    </div>
                    <div class="col-md-3">
                        <label>Select APM</label>
                        <select name="apm" class="form-select select2" multiple required>

                            <option>Select APM</option>

                            {% for a in apms %}
                            <option>{{ a.name }}</option>
                            {% endfor %}

                        </select>
                    </div>
                    <div class="col-md-3">
                        <label>Select Developer</label>
                        <select name="developer" class="form-select select2" multiple required>

                            <option>Select Developer</option>

                            {% for d in developers %}
                            <option>{{ d.name }}</option>
                            {% endfor %}

                        </select>
                    </div>
                    <div class="col-md-3">
                        <label>Timeline</label>
                        <input type="date" name="timeline" class="form-control" required>
                    </div>
                </div>
                <div class="mt-4">
                    <label>Task Details</label>
                    <textarea name="task" class="form-control" rows="4" required></textarea>
                </div>
                <div class="text-end mt-4">
                    <button class="btn btn-primary px-4">Submit</button>
                </div>
            </form>

        </div>

    </div>
    <script>
        $(document).ready(function () {

            $('.select2').select2({
                placeholder: "Select",
                width: '100%'
            });

        });
    </script>
</body>

</html>
